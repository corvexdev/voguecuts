<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vogue Cutts</title>
    <meta name="description" content="Vogue Cutts — Premium barbershop in Vushtrri, Kosovo." />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #11100f;
        color: #f8f4ec;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(201, 151, 78, 0.28), transparent 28%),
          linear-gradient(180deg, #151311 0%, #0d0c0b 60%, #090808 100%);
      }
      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(420px, calc(100vw - 64px));
        padding: 42px 40px;
        border: 1px solid rgba(245, 210, 156, 0.2);
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 35%), rgba(25, 21, 18, 0.92);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      .logo {
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
        display: block;
      }
      h1 {
        margin: 0;
        font-size: 2.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        margin: 14px 0 0;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #c9c0b1;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(245, 210, 156, 0.12);
        border: 1px solid rgba(245, 210, 156, 0.2);
        color: #f8d8a8;
        font-size: 0.78rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Vogue Cutts landing page">
        <img class="logo" src="/logo.svg" alt="Vogue Cutts logo" />
        <h1>Vogue Cutts</h1>
        <p>Premium barbering in Vushtrri, Kosovo.</p>
        <div class="badge">Now live</div>
      </section>
    </main>
  </body>
</html>
